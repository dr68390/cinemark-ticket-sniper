name: watch
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: watcher
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Run sweep
        run: python3 watch.py --once

      - name: Persist state
        run: |
          git config user.name "odyssey-watcher[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add state.json alerts.log 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "state: sweep $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase --autostash origin main || true
            git push
          fi
